# XcodeGen spec — generates ClaudeWatch.xcodeproj deterministically.
#
#   brew install xcodegen
#   cd watch-app
#   xcodegen generate
#   open ClaudeWatch.xcodeproj
#
# Then set your Team under Signing & Capabilities and run on your watch.
# (If you'd rather not use XcodeGen, see README.md for the manual Xcode steps —
#  the .swift files in ClaudeWatch/ are all you need either way.)

name: ClaudeWatch
options:
  bundleIdPrefix: com.example.claudewatch
  deploymentTarget:
    watchOS: "10.0"

schemes:
  ClaudeWatch:
    build:
      targets:
        ClaudeWatch: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  ClaudeWatch:
    type: application
    platform: watchOS
    sources:
      - ClaudeWatch
    info:
      path: ClaudeWatch/Info.plist
      properties:
        CFBundleDisplayName: Claude
        # WKApplication marks the modern single-target watch app.
        WKApplication: true
        # WKWatchOnly = YES declares this a STANDALONE watch app with no companion
        # iPhone app. Required on device: without it the installer fails with
        # MIInstallerErrorDomain 97, demanding a WKCompanionAppBundleIdentifier.
        WKWatchOnly: true
        # LAN fallback: allow http://<Mac-LAN-IP>:8787 while Tailscale HTTPS is not logged in yet.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        # Plain bundle id (no ".watchkitapp" suffix — that convention is for the
        # watch half of a companion iPhone app). Standalone identity is asserted
        # by WKWatchOnly above; this just keeps the id clean.
        PRODUCT_BUNDLE_IDENTIFIER: com.eminersus.claudewatch
        INFOPLIST_KEY_CFBundleDisplayName: Claude
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        CODE_SIGN_STYLE: Automatic
